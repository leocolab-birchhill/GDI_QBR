# Local Postgres for development (required after switching from SQLite).
#   docker compose up -d
#   set DATABASE_URL=postgresql://qbr:qbr@localhost:5432/qbr?schema=public in .env
#   npx prisma migrate dev
services:
  postgres:
    image: postgres:16-alpine
    container_name: gdi-qbr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qbr
      POSTGRES_PASSWORD: qbr
      POSTGRES_DB: qbr
    ports:
      - "5432:5432"
    volumes:
      - qbr_pgdata:/var/lib/postgresql/data

volumes:
  qbr_pgdata:
